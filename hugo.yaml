baseURL: https://ku-lin.github.io/wp/
locale: zh-CN
title: ku-lin's blog
theme:
  - PaperMod

enableRobotsTXT: true

caches:
  images:
    dir: :cacheDir/images

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    noClasses: false

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 20
    - identifier: search
      name: 搜索
      url: /search/
      weight: 30

params:
  env: production
  description: ku-lin 的 Hugo 博客
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hideSummary: false
  homeInfoParams:
    Title: ku-lin's blog
    Content: 记录技术、写作和折腾过程。
  socialIcons:
    - name: github
      url: https://github.com/ku-lin

pygmentsUseClasses: true
taxonomies:
  tag: tags
  category: categories
